# 阶段生成子流程
# 职责：为每个阶段生成详细概述文件
# 输出：volumes/vol_XX_卷名/phases/phase_XX_阶段名.md

name: "phase_flow"
version: "2.0"
start: "generate_phase_detail"

# 本流程使用摘要而非完整数据
context_strategy: "使用分层摘要，避免传递全文"

nodes:
  # 步骤1：生成阶段详细概述
  - id: "generate_phase_detail"
    type: "llm_json"
    next: "fan_out_chapters"
    system_prompt: |
      你是资深网络小说策划和编辑。请为当前阶段生成详细的阶段概述。
      这个文件将作为后续生成章纲和正文的直接参考。
      输出严格的 JSON 格式。
    prompt_template: |
      请为以下阶段生成详细的阶段概述：

      【阶段信息】
      - 卷序号：{volume_index}
      - 卷名：{volume_name}
      - 阶段序号：{phase_index}
      - 阶段名称：{phase_name}
      - 本阶段目标：{phase_goal}
      - 预估字数：{phase_word_count}
      - 节奏定位：{phase_rhythm}
      - 起始状态：{phase_start_state}
      - 结束状态：{phase_end_state}
      - 金手指可用功能：{phase_golden_finger}
      - 关键事件：{phase_key_events}
      - 涉及伏笔：{phase_foreshadowing}

      【卷上下文（摘要层）】
      - 本卷核心矛盾：{volume_core_conflict}
      - 本卷目标：{volume_goal}
      - 本卷金手指能力边界：{volume_golden_finger}

      【全局上下文（摘要层）】
      - 世界观摘要：{worldview_summary}
      - 力量体系摘要：{power_system_summary}
      - 金手指核心能力：{power_system_summary[golden_finger_core]}
      - 金手指限制：{power_system_summary[golden_finger_limits]}
      - 主角内核：{character_core[protagonist][name]} - {character_core[protagonist][personality_flaw]}
      - 情绪曲线（请提取对应条目）：{emotion_curves_full}
      - 伏笔清单（请筛选与本阶段相关的条目）：{foreshadowing_plan_full}
      - 状态追踪：{state_log[dynamic_state]}

      请输出 JSON：
      {{
        "phase_detail": {{
          "phase_synopsis": "阶段内容概要（100字以内）",
          "event_sequence": [
            {{
              "event_index": 1,
              "event_name": "事件名称",
              "event_description": "事件描述",
              "emotional_beat": "情绪节拍",
              "involved_characters": ["涉及角色1", "涉及角色2"],
              "golden_finger_usage": "金手指使用情况",
              "foreshadowing_planted": ["埋入的伏笔"],
              "foreshadowing_revealed": ["揭示/回收的伏笔"],
              "power_display": "力量展示"
            }}
          ],
          "phase_climax": {{
            "climax_event": "高潮事件",
            "climax_description": "高潮描述",
            "emotional_peak": "情绪峰值"
          }},
          "transition_to_next_phase": "与下一阶段的衔接",
          "chapter_count_estimate": "预估章节数（按每章3000字计算）",
          "state_changes": {{
            "protagonist_status": "主角状态变化",
            "golden_finger_status": "金手指状态变化",
            "world_status": "世界/势力状态变化",
            "unresolved_threads": ["未解决的线索"]
          }}
        }}
      }}
    save_as: "phase_detail_data"
    extract_keys:
      - "phase_detail"
    output_file: "{output_root}/volumes/vol_{volume_index:02d}_{volume_name}/phases/phase_{phase_index:02d}_{phase_name}.md"
    llm:
      temperature: 0.6

  # 步骤2：展开章纲（深度上色阶段触发）
  # 注意：广度铺开阶段此节点被跳过，仅在深度上色阶段由引擎调度触发
  - id: "fan_out_chapters"
    type: "fan_out"
    phase: "deep_paint"
    next: "wait_chapters_complete"
    count_from: "{phase_detail_data[chapter_count_estimate]}"
    target: "generate_chapter_outline"
    child_flow_name: "chapter_outline_flow"
    child_context:
      volume_index: "{volume_index}"
      volume_name: "{volume_name}"
      phase_index: "{phase_index}"
      phase_name: "{phase_name}"
      chapter_index: "{fanout_index}"
      chapter_word_count: "{phase_word_count} / {phase_detail_data[chapter_count_estimate]}"
      phase_detail: "{phase_detail_data}"
      # 传递全局上下文到章纲子流程
      worldview_summary: "{worldview_summary}"
      power_system_summary: "{power_system_summary}"
      character_core: "{character_core}"
      golden_finger: "{golden_finger}"
      state_log: "{state_log}"
    save_as: "chapter_run_ids"

  - id: "wait_chapters_complete"
    type: "wait_children"
    next: "phase_complete"
    children_key: "chapter_run_ids"
    on_child_failure: "fail_parent"

  - id: "phase_complete"
    type: "done"