# 节奏驱动型小说大纲模板 - 第1层：卷展开
# 职责：为每卷生成详细设定 + N条故事线
# 输出：卷概述文件 + 故事线列表

name: "volume_flow"
version: "1.0"
start: "generate_volume_detail"

nodes:

  # ==================== 阶段一：生成卷详细设定 ====================

  - id: "generate_volume_detail"
    type: "llm_json_review"
    next: "fan_out_arcs"
    system_prompt: |
      你是资深网络小说策划。请为当前卷生成详细的卷设定和故事线规划。
      输出严格的 JSON 格式。
    prompt_template: |
      【节奏心智模型（参考，非强制）】

      你正在设计一条"故事线"，通常每条故事线约 50 章：

      ┌──────────────────────────────────────────────────────┐
      │  故事线 (~50章)  目标指标: 50章完读率/推荐票峰值        │
      │                                                       │
      │  ┌─────────┬─────────┬──────┬─────────┐              │
      │  │ 高潮1    │ 高潮2    │ ...  │ 高潮N   │              │
      │  │ (~10章)  │ (~10章)  │      │ (~10章) │              │
      │  │ 3爽点收束│ 3爽点收束│      │ 3爽点收束│              │
      │  └─────────┴─────────┴──────┴─────────┘              │
      │                                                       │
      │  节奏要点：                                            │
      │  - 每条故事线由 4-6 个高潮组成                          │
      │  - 高潮之间有2-3章缓冲（日常/铺垫/伏笔回收）             │
      │  - 第一个高潮要快速进入                                  │
      │  - 最后一个高潮要最爽（故事线的payoff）                  │
      │  - 故事线末尾自然转场到下一条                            │
      └──────────────────────────────────────────────────────┘

      你可以自由决定故事线数量和高潮数量，但保持节奏感。

      【你的任务】
      请为当前卷生成详细的卷设定和故事线规划：

      【卷信息】
      - 卷序号：{volume_index}
      - 卷名：{volume_name}
      - 本卷核心矛盾：{volume_core_conflict}
      - 本卷目标：{volume_goal}
      - 节奏定位：{volume_flow_position}
      - 预估字数：{volume_word_count}
      - 故事线数：{volume_arc_count}
      - 卷末悬念：{volume_cliffhanger}
      - 与下卷衔接：{volume_connection}

      【全局上下文】
      - 全局设定：{global_settings}

      请按照以下 JSON 结构输出：
      {{
        "volume_detail": {{
          "synopsis": "卷内容概要（200字以内）",
          "power_level_range": "本卷力量等级范围",
          "golden_finger_boundary": "本卷金手指能力边界",
          "key_characters": [
            {{
              "name": "角色名",
              "role": "本卷角色定位",
              "relationship_to_protagonist": "与主角的关系",
              "arc_in_this_volume": "本卷人物弧线"
            }}
          ],
          "antagonist": {{
            "name": "本卷对抗力量",
            "motivation": "对抗动机",
            "resolution": "本卷结局"
          }},
          "foreshadowing_plan": {{
            "planted": ["本卷埋入的伏笔"],
            "revealed": ["本卷回收的伏笔"]
          }}
        }},
        "arcs": [
          {{
            "arc_index": 1,
            "name": "故事线名称",
            "arc_goal": "本故事线目标",
            "rhythm_position": "节奏定位（铺垫/发展/小高潮/收尾）",
            "start_state": "起始状态",
            "end_state": "结束状态",
            "key_events": ["关键事件1", "关键事件2"],
            "transition_to_next": "与下一条故事线的衔接"
          }}
        ]
      }}
    save_as: "volume_detail"
    extract_keys:
      - "volume_detail"
      - "arcs"
    output_file: "{output_root}/volumes/vol_{volume_index}_{volume_name}/volume_flow.md"
    llm:
      temperature: 0.5

    # Review loop 配置
    review_loop:
      max_rounds: 3
      review_system_prompt: |
        你是资深网文编辑，正在进行卷层审查。
        输出严格的 JSON 格式。
      review_criteria:
        - name: "故事线分布"
          question: "故事线的数量和分工是否合理？有无冗余或缺失？每条故事线是否有明确目标？"
        - name: "卷内节奏"
          question: "故事线之间的节奏是否有变化？（紧张→舒缓→紧张）有无节奏疲劳？"
        - name: "全局一致性"
          question: "是否与卷目标、主线矛盾、力量体系一致？金手指能力是否超出当前卷边界？"
        - name: "转场设计"
          question: "故事线之间的转场是否自然？有无生硬跳跃？每条故事线结尾是否有钩子？"
      modify_system_prompt: |
        你是作者，请根据审查意见修改卷设定。
        保持核心创意不变，针对性解决审查意见中指出的问题。
        输出修改后的完整 JSON。

  # ==================== 阶段二：展开故事线 ====================

  - id: "fan_out_arcs"
    type: "fan_out"
    next: "wait_arcs_complete"
    count_from: "{arcs|length}"
    target: "generate_arc_detail"
    child_flow_name: "arc_flow"
    child_context:
      # 传递卷级设定
      volume_detail: "{volume_detail}"
      volume_index: "{volume_index}"
      volume_name: "{volume_name}"
      # 传递故事线信息
      arc_index: "{fanout_index}"
      arc_name: "{arcs[fanout_index-1][name]}"
      arc_goal: "{arcs[fanout_index-1][arc_goal]}"
      arc_rhythm_position: "{arcs[fanout_index-1][rhythm_position]}"
      arc_start_state: "{arcs[fanout_index-1][start_state]}"
      arc_end_state: "{arcs[fanout_index-1][end_state]}"
      arc_key_events: "{arcs[fanout_index-1][key_events]}"
      arc_transition: "{arcs[fanout_index-1][transition_to_next]}"
      # 传递全局设定
      global_settings: "{global_settings}"
      all_arcs: "{arcs}"
    save_as: "arc_run_ids"

  - id: "wait_arcs_complete"
    type: "wait_children"
    next: "check_first_volume"
    children_key: "arc_run_ids"
    on_child_failure: "warn"

  - id: "check_first_volume"
    type: "branch"
    condition_key: "{volume_index}"
    branches:
      "1": "review_volume"
    default_next: "volume_done"

  - id: "review_volume"
    type: "wait_input"
    on_approved: "volume_done"
    message: "第一卷章节已完成，请检查输出目录。确认后继续，或拒绝修改后重新生成。"

  - id: "volume_done"
    type: "done"
