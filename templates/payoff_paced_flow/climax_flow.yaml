# 节奏驱动型小说大纲模板 - 第3层：高潮展开
# 职责：为每个高潮生成详细设定 + N个爽点
# 输出：高潮概述文件 + 爽点列表

name: "climax_flow"
version: "1.0"
start: "generate_climax_detail"

nodes:

  # ==================== 阶段一：生成高潮详细设定 ====================

  - id: "generate_climax_detail"
    type: "llm_json_review"
    next: "fan_out_payoffs"
    system_prompt: |
      你是资深网络小说策划。请为当前高潮生成详细的设定和爽点规划。
      输出严格的 JSON 格式。
    prompt_template: |
      【节奏心智模型（参考，非强制）】

      你正在设计一个"爽点"，通常由以下结构组成：

      ┌──────────────────────────────────────────────────────┐
      │  爽点 (~3章)  目标指标: 3章留存率                       │
      │                                                       │
      │  ┌──────────┬──────────┬──────────┐                  │
      │  │ 冲突铺垫   │ 情绪蓄力   │ payoff  │                  │
      │  │  (~1章)   │  (~1章)   │ 兑现(~1章)│                  │
      │  │           │          │          │                  │
      │  │ 制造冲突   │ 压抑情绪   │ 释放爽点  │                  │
      │  │ 引入张力   │ 积累期待   │ 满足期待  │                  │
      │  └──────────┴──────────┴──────────┘                  │
      │                                                       │
      │  节奏要点：                                            │
      │  - 铺垫要有张力，不能让读者觉得无聊                     │
      │  - 蓄力要到位，让读者期待释放                           │
      │  - payoff要爽，但不宜过度（避免审美疲劳）               │
      │  - 每3章左右给读者一次满足感                            │
      └──────────────────────────────────────────────────────┘

      你可以自由决定爽点数量，但保持节奏感。

      【你的任务】
      请为以下高潮生成详细的设定和爽点规划：

      【高潮信息】
      - 卷序号：{volume_index}
      - 卷名：{volume_name}
      - 故事线索引：{arc_index}
      - 故事线名：{arc_name}
      - 高潮序号：{climax_index}
      - 高潮名称：{climax_name}
      - 本高潮目标：{climax_goal}
      - 节奏定位：{climax_flow}
      - 情绪主题：{climax_emotional_theme}
      - 关键事件：{climax_key_events}
      - payoff时刻：{climax_payoff}
      - 与下一个高潮衔接：{climax_transition}

      【故事线上下文】
      - 故事线详细设定：{arc_detail}

      请按照以下 JSON 结构输出：
      {{
        "climax_detail": {{
          "synopsis": "高潮内容概要（80字以内）",
          "key_scenes": ["关键场景1", "关键场景2"],
          "emotional_arc": "情绪弧线（从X到Y）",
          "golden_finger_moment": "金手指高光时刻（如有）"
        }},
        "payoffs": [
          {{
            "payoff_index": 1,
            "name": "爽点名称",
            "payoff_goal": "本爽点目标",
            "rhythm_position": "节奏定位（铺垫/蓄力/兑现/收束）",
            "conflict_setup": "冲突铺垫描述",
            "emotion_buildup": "情绪蓄力描述",
            "payoff_delivery": "payoff兑现描述",
            "cool_factor": "爽点类型（打脸/逆袭/惊艳/反转等）",
            "transition_to_next": "与下一个爽点的衔接"
          }}
        ]
      }}
    save_as: "climax_detail"
    extract_keys:
      - "climax_detail"
      - "payoffs"
    output_file: "{output_root}/volumes/vol_{volume_index}_{volume_name}/arcs/arc_{arc_index}_{arc_name}/climaxes/climax_{climax_index}_{climax_name}/climax_flow.md"
    llm:
      temperature: 0.6

    # Review loop 配置
    review_loop:
      max_rounds: 3
      review_system_prompt: |
        你是资深网文编辑，正在进行高潮层审查。
        输出严格的 JSON 格式。
      review_criteria:
        - name: "爽点结构完整性"
          question: "每个爽点是否包含'冲突铺垫→情绪蓄力→payoff兑现'三阶段？有无跳过铺垫直接爽？"
        - name: "爽点密度"
          question: "爽点间距是否合理？（太密→审美疲劳，太疏→读者流失）每3章左右是否有一个满足点？"
        - name: "高潮收束"
          question: "最后一个爽点后是否有高潮收束和转场？高潮是否有足够的仪式感？"
        - name: "3章留存率心智"
          question: "每个爽点的铺垫是否在合理章节内完成？读者能否在3章左右获得一次满足感？"
      modify_system_prompt: |
        你是作者，请根据审查意见修改高潮设定。
        保持核心创意不变，针对性解决审查意见中指出的问题。
        输出修改后的完整 JSON。

  # ==================== 阶段二：展开爽点 ====================

  - id: "fan_out_payoffs"
    type: "fan_out"
    next: "wait_payoffs_complete"
    count_from: "{payoffs|length}"
    target: "generate_payoff_detail"
    child_flow_name: "payoff_flow"
    child_context:
      # 传递高潮设定
      climax_detail: "{climax_detail}"
      volume_index: "{volume_index}"
      volume_name: "{volume_name}"
      arc_index: "{arc_index}"
      arc_name: "{arc_name}"
      climax_index: "{climax_index}"
      climax_name: "{climax_name}"
      # 传递爽点信息
      payoff_index: "{fanout_index}"
      payoff_name: "{payoffs[fanout_index-1][name]}"
      payoff_goal: "{payoffs[fanout_index-1][payoff_goal]}"
      payoff_flow: "{payoffs[fanout_index-1][rhythm_position]}"
      payoff_setup: "{payoffs[fanout_index-1][conflict_setup]}"
      payoff_buildup: "{payoffs[fanout_index-1][emotion_buildup]}"
      payoff_delivery: "{payoffs[fanout_index-1][payoff_delivery]}"
      payoff_cool: "{payoffs[fanout_index-1][cool_factor]}"
      payoff_transition: "{payoffs[fanout_index-1][transition_to_next]}"
      # 传递全局设定
      global_settings: "{global_settings}"
      all_payoffs: "{payoffs}"
    save_as: "payoff_run_ids"

  - id: "wait_payoffs_complete"
    type: "wait_children"
    next: "climax_done"
    children_key: "payoff_run_ids"
    on_child_failure: "warn"

  - id: "climax_done"
    type: "done"
